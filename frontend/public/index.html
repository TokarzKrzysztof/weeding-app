<!DOCTYPE html>
<html lang="pl" xmlns:fb="http://ogp.me/ns/fb#">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/images/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <meta name="robots" content="index, follow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pacifico&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <meta property="og:url" content="https://sarawasko.pl/" />
    <meta property="og:title" content="Sara Waśko - fotografia kulinarna i produktowa" />
    <meta
      property="og:description"
      content="Cześć! Jestem Sara i zajmuje się fotografią, sprawię że Twoje zdjęcia zaczną sprzedawać!"
    />
    <meta property="og:site_name" content="sarawasko.pl" />
    <!-- <meta property="og:image" content="https://meetyo.pl/images/logo-text-preview.png" /> -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="fb:app_id" content="%REACT_APP_FACEBOOK_ID%" />

    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Cześć! Jestem Sara i zajmuje się fotografią, sprawię że Twoje zdjęcia zaczną sprzedawać!"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/logo-icon-192x192.png" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Sara Waśko - fotografia kulinarna, produktowa i reportażowa</title>
  </head>
